services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pfms}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pfms_dev_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-pfms}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pfms} -d ${POSTGRES_DB:-pfms}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "127.0.0.1:5432:5432"

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-pfms}:${POSTGRES_PASSWORD:-pfms_dev_change_me}@db:5432/${POSTGRES_DB:-pfms}
      AUTH_SECRET: ${AUTH_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SEED_ON_START: ${SEED_ON_START:-false}
    ports:
      # bound to loopback only — nginx on the host is the public entrypoint
      - "127.0.0.1:3000:3000"

volumes:
  pgdata:
