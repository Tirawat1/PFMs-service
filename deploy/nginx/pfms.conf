# Nginx reverse proxy for PFMS.
# Copy to /etc/nginx/sites-available/pfms on the EC2 host, symlink into
# sites-enabled, then run certbot (see step_deploy.md) — certbot rewrites
# this file in place to add the HTTPS server block.
#
# Replace YOURNAME with your actual DuckDNS subdomain before deploying.

server {
    listen 80;
    listen [::]:80;
    server_name YOURNAME.duckdns.org;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
